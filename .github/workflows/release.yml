name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. 0.2.0). Leave empty to use package.json.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build signed DMG (macos-latest)
    runs-on: macos-latest
    env:
      # Apple credentials (set in repo secrets)
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      # Tauri updater signing key (placeholder — Worker I wires this up end-to-end)
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Derive release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # strip leading v from tag ref
            v="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
          else
            v="$(node -p "require('./app/package.json').version")"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"

      - name: Import Developer ID certificate to keychain
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        run: |
          set -e
          KEYCHAIN=procman-release.keychain-db
          KEYCHAIN_PASSWORD="${{ github.run_id }}-$RANDOM"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychain -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null

          # Expose identity name to later steps
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep -E '"Developer ID Application:' | head -1 \
            | sed -E 's/.*"(Developer ID Application:[^"]+)".*/\1/')
          echo "DEVELOPER_ID_APPLICATION=$IDENTITY" >> "$GITHUB_ENV"
          echo "Imported: $IDENTITY"

      - name: Warn if no signing cert
        if: env.APPLE_CERTIFICATE_P12_BASE64 == ''
        run: |
          echo "::warning::APPLE_CERTIFICATE_P12_BASE64 not set — DMG will be ad-hoc signed and NOT distributable."

      - name: Install app dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Install mobile dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile

      - name: Build release DMG (sign + notarize)
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh --version "${{ steps.version.outputs.version }}"

      - name: Locate artifacts
        id: artifacts
        run: |
          DMG=$(ls -t app/src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          APP=$(ls -dt app/src-tauri/target/release/bundle/macos/*.app | head -1)
          UPDATER_JSON=$(ls app/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig 2>/dev/null | head -1 || true)
          UPDATER_TAR=$(ls app/src-tauri/target/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1 || true)
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "updater_sig=$UPDATER_JSON" >> "$GITHUB_OUTPUT"
          echo "updater_tar=$UPDATER_TAR" >> "$GITHUB_OUTPUT"
          ls -la app/src-tauri/target/release/bundle/dmg/ || true
          ls -la app/src-tauri/target/release/bundle/macos/ || true

      - name: Generate latest.json (updater manifest)
        if: steps.artifacts.outputs.updater_sig != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SIG_FILE="${{ steps.artifacts.outputs.updater_sig }}"
          TAR_NAME=$(basename "${{ steps.artifacts.outputs.updater_tar }}")
          SIG_CONTENT=$(cat "$SIG_FILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OWNER="${GITHUB_REPOSITORY}"
          DOWNLOAD_URL="https://github.com/${OWNER}/releases/download/v${VERSION}/${TAR_NAME}"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the full release notes at https://github.com/${OWNER}/releases/tag/v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_CONTENT}",
                "url": "${DOWNLOAD_URL}"
              },
              "darwin-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF
          echo "Generated latest.json:"; cat latest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: procman v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.updater_tar }}
            ${{ steps.artifacts.outputs.updater_sig }}
            latest.json

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN != ''
        run: |
          security delete-keychain "$KEYCHAIN" || true
