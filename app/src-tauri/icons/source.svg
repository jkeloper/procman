<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8C42"/>
      <stop offset="1" stop-color="#E8590C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background (macOS app icon corner radius ≈ 22.37%) -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>

  <!-- Terminal prompt glyph: centered > and cursor -->
  <g transform="translate(512 512)" filter="url(#shadow)">
    <!-- Chevron -->
    <path d="M -190 -120 L -40 0 L -190 120"
          fill="none"
          stroke="white"
          stroke-width="68"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <!-- Underscore cursor -->
    <rect x="40" y="60" width="220" height="68" rx="14" fill="white"/>
  </g>
</svg>
