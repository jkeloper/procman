<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="35%" cy="55%" r="65%">
      <stop offset="0" stop-color="#0d2e14"/>
      <stop offset="1" stop-color="#080e0a"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon-r">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="229" ry="229" fill="url(#glow)"/>
  <g fill="none" stroke="#22dd44" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">
    <!-- Head + eye bump, facing right -->
    <path d="M 350 480 Q 300 400 310 320 Q 320 250 380 220 Q 430 200 470 230 Q 500 200 540 215 Q 575 235 570 280 Q 565 320 540 350"/>
    <!-- Snout forward -->
    <path d="M 540 350 L 640 380 Q 690 400 700 440"/>
    <!-- Lower jaw -->
    <path d="M 700 440 Q 670 470 610 480 Q 550 490 490 500"/>
    <!-- Body -->
    <path d="M 490 500 Q 430 530 390 570 Q 350 610 350 670 Q 355 720 390 740"/>
    <!-- Belly connect -->
    <path d="M 350 480 Q 360 510 390 570"/>
    <!-- Eye -->
    <circle cx="475" cy="265" r="42"/>
    <circle cx="483" cy="263" r="15" fill="#080e0a" stroke="#22dd44" stroke-width="5"/>
    <circle cx="477" cy="255" r="6" fill="#22dd44" stroke="none"/>
    <!-- Back leg -->
    <path d="M 380 720 Q 340 780 300 820 Q 275 845 260 835 Q 250 820 270 800 Q 300 760 330 730"/>
    <path d="M 260 835 L 240 845"/>
    <path d="M 260 835 L 255 855"/>
    <!-- Front leg -->
    <path d="M 490 700 Q 510 760 540 800"/>
    <path d="M 540 800 Q 555 810 565 800"/>
    <path d="M 540 800 Q 545 818 535 825"/>
    <!-- Belly -->
    <path d="M 390 740 Q 440 750 490 700"/>
  </g>
  <!-- Tongue — red neon -->
  <g filter="url(#neon-r)">
    <line x1="700" y1="440" x2="860" y2="440" stroke="#ee1111" stroke-width="26" stroke-linecap="round"/>
  </g>
</svg>
